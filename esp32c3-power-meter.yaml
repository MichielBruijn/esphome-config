esphome:
  name: esp32c3-power-meter
    
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# web_server:
#   auth:
#     username: !secret http_username
#     password: !secret http_password
#   port: 80
#   version: 2

wifi:
  power_save_mode: none
  fast_connect: True
  min_auth_mode: WPA2
  reboot_timeout: 90s   # reboot als WiFi 90s niet werkt
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  ap:
    ssid: "esphome-power-meter"
    password: ""
    
captive_portal:

api:
  encryption:
    key: !secret power_meter_api_key

ota:
  - platform: esphome
    password: !secret power_meter_ota_password

logger:
  level: INFO # Even op DEBUG laten staan om te zien of de DSMR component nu werkt

uart:
  id: p1_uart
  rx_pin: 
    number: GPIO3
    inverted: true
    mode:
      input: true
      pullup: true
  baud_rate: 115200
  data_bits: 7
  parity: EVEN
  rx_buffer_size: 1500

# De officiële DSMR component configureren
dsmr:
  id: dsmr_instance
  uart_id: p1_uart
  receive_timeout: 2s

sensor:
  - platform: dsmr
    energy_delivered_tariff1:
      name: "Energie Geleverd Laag (T1)"
    energy_delivered_tariff2:
      name: "Energie Geleverd Hoog (T2)"
    energy_returned_tariff1:
      name: "Energie Teruggeleverd Laag (T1)"
    energy_returned_tariff2:
      name: "Energie Teruggeleverd Hoog (T2)"
    power_delivered:
      name: "Actueel Vermogen"
    gas_delivered:
      name: "Gas Verbruik"

button:
  - platform: restart
    name: "Reboot"