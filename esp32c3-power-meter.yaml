esphome:
  name: esp32c3-power-meter

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

wifi:
  power_save_mode: none
  fast_connect: True
  min_auth_mode: WPA2
  reboot_timeout: 90s
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  ap:
    ssid: "esphome-power-meter"
    password: ""

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

uart:
  id: p1_uart
  rx_pin:
    number: GPIO3
    inverted: true
    mode:
      input: true
      pullup: true
  baud_rate: 115200
  data_bits: 7
  parity: EVEN
  rx_buffer_size: 1500

dsmr:
  id: dsmr_instance
  uart_id: p1_uart
  receive_timeout: 2s

sensor:
  - platform: dsmr
    energy_delivered_tariff1:
      name: "Energy delivered low tariff (T1)"
    energy_delivered_tariff2:
      name: "Energy delivered high tariff (T2)"
    energy_returned_tariff1:
      name: "Energy returned low tariff (T1)"
    energy_returned_tariff2:
      name: "Energy returned high tariff (T2)"
    power_delivered:
      name: "Current power"
    gas_delivered:
      name: "Gas consumption"

button:
  - platform: restart
    name: "Reboot"
