esphome:
  name: esp32c3-zout-niveau
  platformio_options:
    lib_deps:
      - pololu/VL53L1X @ ^1.3.1
    lib_ldf_mode: chain+
  includes:
    - vl53l1x_helper.h
  on_boot:
    priority: 200
    then:
      - lambda: |-
          vl53_setup();
      - script.execute: meet_loop

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

wifi:
  power_save_mode: none
  min_auth_mode: WPA2
  fast_connect: true
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  ap:
    ssid: "esphome-zoutniveau"
    password: ""

captive_portal:

# web_server:
#   auth:
#     username: !secret http_username
#     password: !secret http_password
#   port: 80
#   version: 2

api:
  encryption:
    key: !secret zout_niveau_api_key

ota:
  - platform: esphome
    password: !secret zout_niveau_ota_password

logger:
#  baud_rate: 0
#  level: DEBUG
  level: INFO

globals:
  - id: depth_full_cm
    type: float
    restore_value: yes
    initial_value: '2.5'
  - id: depth_empty_cm
    type: float
    restore_value: yes
    initial_value: '34.0'

sensor:
  - platform: template
    id: zout_afstand_cm
    name: "Zout afstand (cm)"
    unit_of_measurement: "cm"
    accuracy_decimals: 1
    update_interval: never
    filters:
      - delta: 0.1
    on_value:
      then:
        - component.update: zout_niveau_pct

  - platform: template
    id: zout_niveau_pct
    name: "Zout niveau (%)"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never
    lambda: |-
      const float d  = id(zout_afstand_cm).state;
      const float df = id(depth_full_cm);
      const float de = id(depth_empty_cm);
      if (isnan(d) || de <= df) return NAN;
      float pct = (de - d) * 100.0f / (de - df);
      if (pct < 0)   pct = 0;
      if (pct > 100) pct = 100;
      return pct;

number:
  - platform: template
    id: meet_interval_s
    name: "Zout meet-interval (s)"
    optimistic: true
    min_value: 5
    max_value: 300
    step: 5
    initial_value: 20

  - platform: template
    id: depth_full_number
    name: "Zout afstand VOL (cm)"
    optimistic: true
    min_value: 0
    max_value: 45
    step: 0.5
    initial_value: 2.5
    set_action:
      - lambda: |-
          id(depth_full_cm) = x;

  - platform: template
    id: depth_empty_number
    name: "Zout afstand LEEG (cm)"
    optimistic: true
    min_value: 5
    max_value: 45
    step: 0.5
    initial_value: 34
    set_action:
      - lambda: |-
          id(depth_empty_cm) = x;

script:
  - id: do_meet
    mode: queued
    then:
      - lambda: |-
          publish_zoutafstand();      // publiceert zout_afstand_cm
      - component.update: zout_niveau_pct

  - id: meet_loop
    mode: restart
    then:
      - script.execute: do_meet
      - delay: !lambda "return (uint32_t)(id(meet_interval_s).state * 1000);"
      - script.execute: meet_loop

button:
  - platform: template
    name: "Meet nu"
    on_press:
      - script.execute: do_meet

  - platform: restart
    name: "Reboot"
