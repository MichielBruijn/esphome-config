# Kopieer dit bestand naar secrets.yaml en vul je eigen waarden in.
# secrets.yaml staat in .gitignore en wordt NIET gepusht naar GitHub.

wifi_ssid: "jouw_wifi_naam"
wifi_password: "jouw_wifi_wachtwoord"

# Genereer een nieuwe API key via: esphome generate-api-key
# Of gebruik de ESPHome dashboard -> "Generate API key"
api_key: "VERVANG_MET_JOUW_API_KEY"

# Genereer een willekeurig wachtwoord, bijv: openssl rand -hex 16
ota_password: "VERVANG_MET_JOUW_OTA_PASSWORD"
