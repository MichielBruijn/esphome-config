# Copy this file to secrets.yaml and fill in your own values.
# secrets.yaml is listed in .gitignore and will NOT be pushed to GitHub.

wifi_ssid: "your_wifi_network_name"
wifi_password: "your_wifi_password"

# Generate a new API key via: esphome generate-api-key
# Or use the ESPHome dashboard -> "Generate API key"
api_key: "REPLACE_WITH_YOUR_API_KEY"

# Generate a random password, e.g.: openssl rand -hex 16
ota_password: "REPLACE_WITH_YOUR_OTA_PASSWORD"
