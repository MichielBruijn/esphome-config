# Copy this file to secrets.yaml and fill in your own values.
# secrets.yaml is listed in .gitignore and will NOT be pushed to GitHub.

wifi_ssid: "your_wifi_network_name"
wifi_password: "your_wifi_password"

# Webportal authentication
http_username: "your_username"
http_password: "your_password"

# API encryption keys per device — generate via: esphome generate-api-key
deurbel_api_key: "REPLACE_WITH_YOUR_API_KEY"
power_meter_api_key: "REPLACE_WITH_YOUR_API_KEY"
tft_watermeter_api_key: "REPLACE_WITH_YOUR_API_KEY"
zonnescherm_api_key: "REPLACE_WITH_YOUR_API_KEY"
zout_niveau_api_key: "REPLACE_WITH_YOUR_API_KEY"
rolluik_groot_api_key: "REPLACE_WITH_YOUR_API_KEY"
rolluik_klein_api_key: "REPLACE_WITH_YOUR_API_KEY"
airco_zolder_voor_api_key: "REPLACE_WITH_YOUR_API_KEY"
airco_zolder_achter_api_key: "REPLACE_WITH_YOUR_API_KEY"
rolluik_zolder_achter_api_key: "REPLACE_WITH_YOUR_API_KEY"

# OTA passwords per device — generate via: openssl rand -hex 16
